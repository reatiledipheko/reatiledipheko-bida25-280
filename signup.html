<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PowerFit Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
        <nav class="navbar">
            <h1 class="logo">PowerFit Gym</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="trainers.html">Trainers</a></li>
                <li><a href="membership.html">Membership</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="contact.html">Contact</a></li>
                </ul>
        </nav>
    </header>
    <section class="form-container">
      <h1>PUSH YOUR LIMITS</h1>
      <form>
        <label> Full Name </label>
        <input type="text" placeholder="Enter your full name" required>
        <label> Email </label>
        <input type="email" placeholder="Enter your email" required>
        <label> Phone Number </label>
        <input type="tel" placeholder="Enter your phone number" required>
        <label> Select Plan</label>
        <select name="plan" required>
          <option value="">Choose a plan</option>
          <option value="basic">Basic Plan - P300</option>
          <option value="premium">Premium Plan - P500</option>
          <option value="vip">VIP Plan - P800</option>
        </select>
        <label> Password </label>
        <input type="password" placeholder="Create a password" required>
        <button type="submit">Sign Up</button>
    </form>
    </section>
    </body>
</html>
